        barberAvatar:
          type: string
        userName:
          type: string
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        totalDuration:
          type: integer
        totalAmount:
          type: number
        discountAmount:
          type: number
        finalAmount:
          type: number
        isHomeService:
          type: boolean
        address:
