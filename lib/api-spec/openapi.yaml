        ownerId:
          type: integer
        name:
          type: string
        description:
          type: string
        city:
          type: string
        area:
          type: string
        address:
          type: string
        phone:
          type: string
        images:
          type: array
          items:
            type: string
        openTime:
          type: string
        closeTime:
          type: string
        rating:
          type: number
        totalBarbers:
          type: integer
        createdAt:
          type: string
